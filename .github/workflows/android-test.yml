name: Android Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Ensures compileSdk / build-tools match the version in
      # android/gradle/libs.versions.toml (compileSdk = 35). Without this,
      # AGP 9 fails on a fresh runner.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      # Caches Gradle home + dependencies between runs. Gradle 9.4.1 is
      # the minimum compatible with AGP 9.2.x (see
      # android/gradle/libs.versions.toml — agp version).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 9.4.1
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Wrapper jar isn't committed (per android/.gitignore); generate it
      # before invoking ./gradlew.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.4.1

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-${{ github.event.pull_request.number }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
