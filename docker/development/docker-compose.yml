
networks:
    tasks:

services:
    tasks-db:
        image: postgres:14-alpine
        environment:
            POSTGRES_PASSWORD: secret
            POSTGRES_USER: tasks
            POSTGRES_DB: tasks
        volumes:
            - "./db:/var/lib/postgresql/data"
        networks:
            - tasks
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U tasks"]
            interval: 2s
            timeout: 2s
            retries: 10
    tasks-queue:
        image: redis:7-alpine
        networks:
          - tasks
    tasks-minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - "./minio:/data"
        networks:
            - tasks
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 3s
            timeout: 2s
            retries: 10
    tasks-minio-init:
        image: minio/mc:latest
        depends_on:
            tasks-minio:
                condition: service_healthy
        networks:
            - tasks
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://tasks-minio:9000 minioadmin minioadmin &&
            mc mb -p local/trip-photos &&
            exit 0;"
    tasks-celery:
        image: "python:3.10-alpine"
        volumes:
            - "../..:/app"
        networks:
            - tasks
        depends_on:
            - tasks-queue
            - tasks-minio
        environment:
            AWS_ACCESS_KEY_ID: minioadmin
            AWS_SECRET_ACCESS_KEY: minioadmin
            AWS_S3_BUCKET: trip-photos
            AWS_S3_ENDPOINT_URL: "http://tasks-minio:9000"
            AWS_S3_PUBLIC_ENDPOINT_URL: "http://10.0.2.2:9000"
        command: "/app/docker/development/scripts/run-celery.sh"
        working_dir: /app
    tasks-backend:
        image: "python:3.10-alpine"
        volumes:
            - "../..:/app"
        ports:
            - "8000:8000"
        networks:
            - tasks
        depends_on:
            tasks-db:
                condition: service_healthy
            tasks-minio:
                condition: service_healthy
        environment:
            AWS_ACCESS_KEY_ID: minioadmin
            AWS_SECRET_ACCESS_KEY: minioadmin
            AWS_S3_BUCKET: trip-photos
            AWS_S3_ENDPOINT_URL: "http://tasks-minio:9000"
            AWS_S3_PUBLIC_ENDPOINT_URL: "http://10.0.2.2:9000"
        command: "/app/docker/development/scripts/run-development.sh"
        working_dir: /app
    tasks-frontend:
        image: "node:24-alpine"
        volumes:
            - "../..:/app"
        command: "/app/docker/development/scripts/run-frontend.sh"
        working_dir: /app
    mcp-postgres:
        image: bytebase/dbhub:latest
        ports:
            - "7079:8080"
        networks:
            - tasks
        environment:
            - DBHUB_LOG_LEVEL=info
        command:
            - --transport
            - http
            - --port
            - "8080"
            - --readonly
            - --dsn
            - "postgres://tasks:secret@tasks-db:5432/tasks"
        depends_on:
            tasks-db:
                condition: service_healthy
